<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turni - Md Buona Spesa</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
.wrap{padding:15px}
button{padding:12px;margin:5px 0;width:100%;border:none;border-radius:10px;background:#1f4e78;color:#fff;font-size:16px}
.card{background:#fff;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<h2>Turnistica</h2>

<button onclick="genera()">Genera planning</button>

<div id="output"></div>

</div>

<script>
function genera(){
const giorni=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
let html="";

giorni.forEach(g=>{
 html+=`<div class='card'><b>${g}</b><br>
 Gerente 14-21:15<br>
 PT 14-17:15<br>
 PT 17:15-20:30<br>
 PT 17:30-21:15
 </div>`;
});

document.getElementById("output").innerHTML=html;
}
</script>
</body>
</html>
