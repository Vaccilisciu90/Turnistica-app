<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md Buona Spesa Italia – Operativa v1</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
.wrap{max-width:1400px;margin:10px auto;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
button{padding:10px;margin:5px;border:none;background:#1f4e78;color:#fff;border-radius:8px}
.day{border:1px solid #ccc;border-radius:8px;padding:6px;margin:5px}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h2>Md Buona Spesa Italia – Operativa v1</h2>
<button onclick="genera()">Genera settimana</button>
</div>
<div id="out"></div>
</div>

<script>
const gerenti=["Bruno","Mariagrazia","Vincenzo","Deborah"];
const giorni=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

function genera(){
 let html="";
 let riposiIndex=0;

 giorni.forEach((g,i)=>{
   let riposo=gerenti[riposiIndex%4];

   // Bruno e Mariagrazia solo gio/ven/dom
   if((g==="Gio"||g==="Ven"||g==="Dom")){
     riposo = (i%2===0) ? "Bruno" : "Mariagrazia";
   }

   let disponibili=gerenti.filter(x=>x!==riposo);

   let apertura=disponibili[0];
   let chiusura=disponibili[1];

   html+=`<div class="card">
   <strong>${g}</strong><br>
   Riposo: ${riposo}<br>
   Apertura: ${apertura}<br>
   Chiusura: ${chiusura}<br>
   Supporto: ${disponibili[2]}
   </div>`;

   riposiIndex++;
 });

 document.getElementById("out").innerHTML=html;
}
</script>
</body>
</html>
